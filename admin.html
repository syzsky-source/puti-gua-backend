<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>菩提卦馆后台 - 用户管理</title>
  <style>
    :root {
      --bg: #f7f3ea;
      --panel: #fffaf1;
      --panel2: #fff;
      --text: #2b2118;
      --muted: #7a6b5d;
      --line: #eadfce;
      --brand: #8a5a2b;
      --brand2: #b37a38;
      --danger: #b42318;
      --green: #157347;
      --shadow: 0 18px 45px rgba(72, 45, 18, .12);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: radial-gradient(circle at top left, #fff7e4 0, var(--bg) 38%, #f2eadc 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .app { max-width: 1380px; margin: 0 auto; padding: 24px; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
      margin-bottom: 20px;
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .logo {
      width: 46px; height: 46px; border-radius: 16px;
      display: grid; place-items: center;
      background: linear-gradient(135deg, #5d3519, #b47a39);
      color: #fff; font-size: 24px; box-shadow: var(--shadow);
    }
    h1 { font-size: 24px; margin: 0; letter-spacing: .5px; }
    .subtitle { margin-top: 4px; color: var(--muted); font-size: 13px; }

    .token-box {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: flex-end;
      background: rgba(255, 250, 241, .82); border: 1px solid var(--line);
      border-radius: 999px; padding: 8px 10px; box-shadow: 0 10px 25px rgba(72,45,18,.06);
    }
    input, select, button, textarea {
      font: inherit;
    }
    input, select, textarea {
      border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px;
      background: #fff; color: var(--text); outline: none;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--brand2); box-shadow: 0 0 0 3px rgba(179,122,56,.14); }
    .token-input { width: 230px; }
    .api-input { width: 250px; }
    button {
      border: 0; border-radius: 12px; padding: 10px 14px; cursor: pointer;
      color: #fff; background: linear-gradient(135deg, var(--brand), var(--brand2));
      box-shadow: 0 10px 20px rgba(138,90,43,.16);
      transition: transform .12s ease, opacity .12s ease;
    }
    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: .55; cursor: not-allowed; transform: none; }
    .btn-light { background: #fff; color: var(--brand); border: 1px solid var(--line); box-shadow: none; }
    .btn-danger { background: linear-gradient(135deg, #a61b13, #d64635); }
    .btn-green { background: linear-gradient(135deg, #146c43, #2e9f62); }
    .btn-small { padding: 7px 10px; border-radius: 10px; font-size: 13px; }

    .cards {
      display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; margin-bottom: 16px;
    }
    .card {
      background: rgba(255,250,241,.9); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 18px; box-shadow: var(--shadow);
    }
    .card-label { color: var(--muted); font-size: 13px; }
    .card-value { font-size: 28px; font-weight: 800; margin-top: 8px; }

    .toolbar {
      background: rgba(255,250,241,.9); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 14px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
      box-shadow: var(--shadow); margin-bottom: 14px;
    }
    .toolbar-left, .toolbar-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .search-input { width: 280px; }

    .table-panel {
      background: rgba(255,255,255,.72); border: 1px solid var(--line); border-radius: var(--radius);
      overflow: hidden; box-shadow: var(--shadow);
    }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 1120px; }
    th, td { padding: 13px 14px; border-bottom: 1px solid #f0e7d9; text-align: left; vertical-align: middle; }
    th { background: #fff8eb; color: #6b4a2e; font-size: 13px; white-space: nowrap; }
    td { font-size: 14px; }
    tr:hover td { background: #fffaf1; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 12px; }
    .muted { color: var(--muted); }
    .pill { display: inline-flex; align-items: center; padding: 4px 9px; border-radius: 999px; background: #f4eadb; color: #6d4b2c; font-size: 12px; }
    .pill.paid { background: #e8f6ee; color: var(--green); }
    .pill.pending { background: #fff2cc; color: #8a5a00; }
    .pill.cancelled { background: #f7e4e2; color: var(--danger); }
    .points { font-weight: 800; color: var(--brand); }

    .empty { padding: 46px; text-align: center; color: var(--muted); }
    .footerbar { display: flex; justify-content: space-between; align-items: center; padding: 14px; gap: 12px; flex-wrap: wrap; }
    .pager { display: flex; gap: 8px; align-items: center; }

    .drawer-mask {
      position: fixed; inset: 0; background: rgba(31,23,15,.38); backdrop-filter: blur(4px);
      display: none; align-items: stretch; justify-content: flex-end; z-index: 50;
    }
    .drawer-mask.show { display: flex; }
    .drawer {
      width: min(720px, 100%); background: #fffaf1; height: 100%; overflow-y: auto;
      box-shadow: -20px 0 50px rgba(31,23,15,.22); padding: 22px;
      animation: slideIn .16s ease-out;
    }
    @keyframes slideIn { from { transform: translateX(20px); opacity: .4; } to { transform: translateX(0); opacity: 1; } }
    .drawer-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
    .drawer-title { font-size: 20px; font-weight: 800; margin: 0; }
    .section { background: #fff; border: 1px solid var(--line); border-radius: 16px; padding: 16px; margin-bottom: 14px; }
    .section h3 { margin: 0 0 12px; font-size: 16px; }
    .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .kv { background: #fff8eb; border: 1px solid #f0e3d1; border-radius: 12px; padding: 11px; }
    .kv .k { color: var(--muted); font-size: 12px; margin-bottom: 5px; }
    .kv .v { font-weight: 700; word-break: break-all; }
    .adjust-row { display: grid; grid-template-columns: 140px 1fr auto; gap: 10px; align-items: start; }
    .orders-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-bottom: 10px; }
    .mini-table { min-width: 660px; }

    .toast {
      position: fixed; right: 22px; bottom: 22px; background: #2b2118; color: #fff;
      padding: 12px 15px; border-radius: 12px; box-shadow: var(--shadow); display: none; z-index: 80;
    }
    .toast.show { display: block; }
    .loading { opacity: .55; pointer-events: none; }

    @media (max-width: 900px) {
      .app { padding: 16px; }
      .topbar { align-items: flex-start; flex-direction: column; }
      .token-box { width: 100%; justify-content: flex-start; border-radius: 18px; }
      .token-input, .api-input, .search-input { width: 100%; }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .detail-grid { grid-template-columns: 1fr; }
      .adjust-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="brand">
        <div class="logo">卦</div>
        <div>
          <h1>菩提卦馆后台</h1>
          <div class="subtitle">用户管理 · 剩余次数 · 订单记录 · 手动加减次数</div>
        </div>
      </div>
      <div class="token-box">
        <input id="apiBaseInput" class="api-input" placeholder="API 地址，默认当前域名" />
        <input id="tokenInput" class="token-input" type="password" placeholder="输入 ADMIN_TOKEN" />
        <button id="saveTokenBtn" class="btn-small">保存</button>
        <button id="clearTokenBtn" class="btn-small btn-light">清除</button>
      </div>
    </div>

    <div class="cards">
      <div class="card"><div class="card-label">用户总数</div><div id="totalUsers" class="card-value">-</div></div>
      <div class="card"><div class="card-label">本页用户</div><div id="pageUsers" class="card-value">-</div></div>
      <div class="card"><div class="card-label">本页剩余次数</div><div id="pagePoints" class="card-value">-</div></div>
      <div class="card"><div class="card-label">本页付款金额</div><div id="pagePaid" class="card-value">-</div></div>
    </div>

    <div class="toolbar">
      <div class="toolbar-left">
        <input id="keywordInput" class="search-input" placeholder="搜索用户ID / 昵称 / 手机 / 微信" />
        <select id="pageSizeSelect">
          <option value="10">每页 10 条</option>
          <option value="20" selected>每页 20 条</option>
          <option value="50">每页 50 条</option>
          <option value="100">每页 100 条</option>
        </select>
        <button id="searchBtn">搜索</button>
        <button id="resetBtn" class="btn-light">重置</button>
      </div>
      <div class="toolbar-right">
        <button id="refreshBtn" class="btn-light">刷新</button>
      </div>
    </div>

    <div id="tablePanel" class="table-panel">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>用户ID</th>
              <th>昵称</th>
              <th>手机</th>
              <th>微信</th>
              <th>剩余次数</th>
              <th>累计付款</th>
              <th>订单数</th>
              <th>已付款订单</th>
              <th>最近订单</th>
              <th>更新时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="usersBody"></tbody>
        </table>
      </div>
      <div id="emptyState" class="empty" style="display:none;">暂无用户数据</div>
      <div class="footerbar">
        <div id="pageInfo" class="muted">-</div>
        <div class="pager">
          <button id="prevBtn" class="btn-light btn-small">上一页</button>
          <button id="nextBtn" class="btn-light btn-small">下一页</button>
        </div>
      </div>
    </div>
  </div>

  <div id="drawerMask" class="drawer-mask">
    <div class="drawer">
      <div class="drawer-head">
        <div>
          <p class="drawer-title">用户详情</p>
          <div id="drawerUserId" class="mono muted"></div>
        </div>
        <button id="closeDrawerBtn" class="btn-light">关闭</button>
      </div>

      <div class="section">
        <h3>基础信息</h3>
        <div id="userDetailBox" class="detail-grid"></div>
      </div>

      <div class="section">
        <h3>手动加减次数</h3>
        <div class="adjust-row">
          <input id="pointsInput" type="number" step="1" placeholder="例如 5 或 -3" />
          <input id="reasonInput" placeholder="备注，例如：后台手动补次数" />
          <button id="adjustBtn">提交</button>
        </div>
        <div class="muted" style="margin-top:10px;font-size:13px;">正数表示增加次数，负数表示扣减次数，扣减后最低为 0。</div>
      </div>

      <div class="section">
        <div class="orders-toolbar">
          <h3 style="margin:0;">订单记录</h3>
          <select id="orderStatusSelect">
            <option value="">全部状态</option>
            <option value="pending">待支付</option>
            <option value="proof_uploaded">已上传截图</option>
            <option value="paid">已确认付款</option>
            <option value="cancelled">已取消</option>
            <option value="refunded">已退款</option>
          </select>
        </div>
        <div class="table-wrap">
          <table class="mini-table">
            <thead>
              <tr>
                <th>订单ID</th>
                <th>商品</th>
                <th>金额</th>
                <th>次数</th>
                <th>状态</th>
                <th>创建时间</th>
              </tr>
            </thead>
            <tbody id="ordersBody"></tbody>
          </table>
        </div>
        <div id="ordersEmpty" class="empty" style="display:none;">该用户暂无订单</div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const STORAGE_TOKEN_KEY = 'puti_admin_token';
    const STORAGE_API_KEY = 'puti_admin_api_base';

    const state = {
      page: 1,
      pageSize: 20,
      total: 0,
      keyword: '',
      selectedUserId: '',
      users: []
    };

    const $ = (id) => document.getElementById(id);

    function getApiBase() {
      return ($('apiBaseInput').value || localStorage.getItem(STORAGE_API_KEY) || location.origin).replace(/\/$/, '');
    }

    function getToken() {
      return $('tokenInput').value || localStorage.getItem(STORAGE_TOKEN_KEY) || '';
    }

    function toast(msg) {
      const el = $('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2400);
    }

    function setLoading(isLoading) {
      $('tablePanel').classList.toggle('loading', isLoading);
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (m) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[m]));
    }

    function fmtDate(value) {
      if (!value) return '-';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return d.toLocaleString('zh-CN', { hour12: false });
    }

    function fmtMoney(value) {
      const num = Number(value || 0);
      return '¥' + num.toFixed(2);
    }

    function statusText(status) {
      const map = {
        pending: '待支付',
        proof_uploaded: '已上传截图',
        paid: '已确认付款',
        cancelled: '已取消',
        refunded: '已退款'
      };
      return map[status] || status || '-';
    }

    function statusClass(status) {
      if (status === 'paid') return 'paid';
      if (status === 'cancelled' || status === 'refunded') return 'cancelled';
      return 'pending';
    }

    async function api(path, options = {}) {
      const token = getToken();
      if (!token) throw new Error('请先输入并保存 ADMIN_TOKEN');

      const headers = Object.assign({ 'x-admin-token': token }, options.headers || {});
      if (options.body && !(options.body instanceof FormData)) headers['Content-Type'] = 'application/json';

      const res = await fetch(getApiBase() + path, Object.assign({}, options, { headers }));
      const text = await res.text();
      let payload;
      try { payload = text ? JSON.parse(text) : {}; } catch (_) { payload = { code: res.status, msg: text || res.statusText }; }

      if (!res.ok || payload.code !== 0) {
        throw new Error(payload.msg || `请求失败：${res.status}`);
      }
      return payload.data;
    }

    async function loadUsers() {
      try {
        setLoading(true);
        const qs = new URLSearchParams({
          page: String(state.page),
          page_size: String(state.pageSize)
        });
        if (state.keyword) qs.set('keyword', state.keyword);
        const data = await api('/api/admin/users?' + qs.toString());
        state.users = data.list || [];
        state.total = Number(data.total || 0);
        renderUsers();
      } catch (err) {
        toast(err.message);
      } finally {
        setLoading(false);
      }
    }

    function renderUsers() {
      const rows = state.users;
      $('usersBody').innerHTML = rows.map((u) => `
        <tr>
          <td class="mono">${escapeHtml(u.id)}</td>
          <td>${escapeHtml(u.nickname || '-')}</td>
          <td>${escapeHtml(u.phone || '-')}</td>
          <td>${escapeHtml(u.wechat || '-')}</td>
          <td><span class="points">${Number(u.points_balance || 0)}</span></td>
          <td>${fmtMoney(u.total_paid)}</td>
          <td>${Number(u.total_orders || 0)}</td>
          <td>${Number(u.paid_orders || 0)}</td>
          <td>${fmtDate(u.latest_order_at)}</td>
          <td>${fmtDate(u.updated_at)}</td>
          <td>
            <button class="btn-small" data-action="detail" data-user-id="${escapeHtml(u.id)}">详情</button>
          </td>
        </tr>
      `).join('');

      $('emptyState').style.display = rows.length ? 'none' : 'block';
      const totalPages = Math.max(1, Math.ceil(state.total / state.pageSize));
      $('pageInfo').textContent = `第 ${state.page} / ${totalPages} 页，共 ${state.total} 个用户`;
      $('prevBtn').disabled = state.page <= 1;
      $('nextBtn').disabled = state.page >= totalPages;

      $('totalUsers').textContent = state.total;
      $('pageUsers').textContent = rows.length;
      $('pagePoints').textContent = rows.reduce((sum, u) => sum + Number(u.points_balance || 0), 0);
      $('pagePaid').textContent = fmtMoney(rows.reduce((sum, u) => sum + Number(u.paid_amount || u.total_paid || 0), 0));
    }

    async function openUser(userId) {
      state.selectedUserId = userId;
      $('drawerMask').classList.add('show');
      $('drawerUserId').textContent = userId;
      $('userDetailBox').innerHTML = '<div class="muted">加载中...</div>';
      $('ordersBody').innerHTML = '';
      $('ordersEmpty').style.display = 'none';
      $('pointsInput').value = '';
      $('reasonInput').value = '';

      try {
        const data = await api('/api/admin/users/' + encodeURIComponent(userId));
        renderUserDetail(data);
        renderOrders(data.recent_orders || []);
      } catch (err) {
        toast(err.message);
      }
    }

    function kv(label, value) {
      return `<div class="kv"><div class="k">${escapeHtml(label)}</div><div class="v">${escapeHtml(value ?? '-')}</div></div>`;
    }

    function renderUserDetail(data) {
      const u = data.user || {};
      const s = data.stats || {};
      $('userDetailBox').innerHTML = [
        kv('用户ID', u.id),
        kv('昵称', u.nickname || '-'),
        kv('手机', u.phone || '-'),
        kv('微信', u.wechat || '-'),
        kv('剩余次数', Number(u.points_balance || 0)),
        kv('累计付款', fmtMoney(u.total_paid)),
        kv('总订单数', Number(s.total_orders || 0)),
        kv('已付款订单', Number(s.paid_orders || 0)),
        kv('待支付订单', Number(s.pending_orders || 0)),
        kv('上传截图订单', Number(s.proof_uploaded_orders || 0)),
        kv('创建时间', fmtDate(u.created_at)),
        kv('更新时间', fmtDate(u.updated_at))
      ].join('');
    }

    function renderOrders(orders) {
      $('ordersBody').innerHTML = orders.map((o) => `
        <tr>
          <td class="mono">${escapeHtml(o.id)}</td>
          <td>${escapeHtml(o.product_name || o.product_id || '-')}</td>
          <td>${fmtMoney(o.amount)}</td>
          <td>${Number(o.points_count || 0)}</td>
          <td><span class="pill ${statusClass(o.status)}">${statusText(o.status)}</span></td>
          <td>${fmtDate(o.created_at)}</td>
        </tr>
      `).join('');
      $('ordersEmpty').style.display = orders.length ? 'none' : 'block';
    }

    async function loadUserOrders() {
      if (!state.selectedUserId) return;
      try {
        const status = $('orderStatusSelect').value;
        const qs = new URLSearchParams({ page: '1', page_size: '50' });
        if (status) qs.set('status', status);
        const data = await api(`/api/admin/users/${encodeURIComponent(state.selectedUserId)}/orders?${qs.toString()}`);
        renderOrders(data.list || []);
      } catch (err) {
        toast(err.message);
      }
    }

    async function adjustPoints() {
      const userId = state.selectedUserId;
      const points = Number($('pointsInput').value);
      const reason = $('reasonInput').value.trim();
      if (!userId) return;
      if (!Number.isInteger(points) || points === 0) return toast('请输入非 0 整数，例如 5 或 -3');

      const actionText = points > 0 ? `增加 ${points} 次` : `扣减 ${Math.abs(points)} 次`;
      if (!confirm(`确认给用户 ${userId} ${actionText}？`)) return;

      try {
        $('adjustBtn').disabled = true;
        const data = await api('/api/admin/users/' + encodeURIComponent(userId) + '/points', {
          method: 'POST',
          body: JSON.stringify({ points, reason })
        });
        toast(`操作成功，当前剩余 ${data.points_balance} 次`);
        await openUser(userId);
        await loadUsers();
      } catch (err) {
        toast(err.message);
      } finally {
        $('adjustBtn').disabled = false;
      }
    }

    function bindEvents() {
      $('saveTokenBtn').addEventListener('click', () => {
        localStorage.setItem(STORAGE_TOKEN_KEY, $('tokenInput').value.trim());
        localStorage.setItem(STORAGE_API_KEY, getApiBase());
        toast('已保存');
        loadUsers();
      });
      $('clearTokenBtn').addEventListener('click', () => {
        localStorage.removeItem(STORAGE_TOKEN_KEY);
        localStorage.removeItem(STORAGE_API_KEY);
        $('tokenInput').value = '';
        $('apiBaseInput').value = location.origin;
        toast('已清除');
      });
      $('searchBtn').addEventListener('click', () => {
        state.page = 1;
        state.keyword = $('keywordInput').value.trim();
        state.pageSize = Number($('pageSizeSelect').value);
        loadUsers();
      });
      $('resetBtn').addEventListener('click', () => {
        $('keywordInput').value = '';
        state.keyword = '';
        state.page = 1;
        loadUsers();
      });
      $('refreshBtn').addEventListener('click', loadUsers);
      $('prevBtn').addEventListener('click', () => { if (state.page > 1) { state.page -= 1; loadUsers(); } });
      $('nextBtn').addEventListener('click', () => {
        const totalPages = Math.max(1, Math.ceil(state.total / state.pageSize));
        if (state.page < totalPages) { state.page += 1; loadUsers(); }
      });
      $('pageSizeSelect').addEventListener('change', () => {
        state.pageSize = Number($('pageSizeSelect').value);
        state.page = 1;
        loadUsers();
      });
      $('keywordInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') $('searchBtn').click();
      });
      $('usersBody').addEventListener('click', (e) => {
        const btn = e.target.closest('[data-action="detail"]');
        if (btn) openUser(btn.dataset.userId);
      });
      $('closeDrawerBtn').addEventListener('click', () => $('drawerMask').classList.remove('show'));
      $('drawerMask').addEventListener('click', (e) => {
        if (e.target === $('drawerMask')) $('drawerMask').classList.remove('show');
      });
      $('adjustBtn').addEventListener('click', adjustPoints);
      $('orderStatusSelect').addEventListener('change', loadUserOrders);
    }

    function init() {
      $('apiBaseInput').value = localStorage.getItem(STORAGE_API_KEY) || location.origin;
      $('tokenInput').value = localStorage.getItem(STORAGE_TOKEN_KEY) || '';
      bindEvents();
      if (getToken()) loadUsers();
    }

    init();
  </script>
</body>
</html>
